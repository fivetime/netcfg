# 用户原始配置 (修正版)
# 修正: route -> routes, 添加 CIDR, 避免命名冲突
netns:
  sample1:
    ethernets:
      eth1:
        addresses:
          - 192.168.20.1/24
        routes:
          - to: default
            via: 192.168.20.254
    post-script: |
      echo "sample1 configured"
      # sysctl --system
      # iptables-restore /etc/iptables/rules.v4

  sample2:
    ethernets:
      eth2:
        addresses:
          - 172.16.10.1/24
    dummy-devices:
      dummy-s2:
        addresses:
          - 172.16.20.1/24
    veth-devices:
      veth-s2:
        addresses:
          - 172.16.30.1/24
        peer:
          name: veth-s1
          netns: sample1
          addresses:
            - 172.16.30.2/24
