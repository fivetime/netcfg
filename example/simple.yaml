# Simple netcfg example - netplan compatible
network:
  version: 2

  ethernets:
    eth0:
      addresses:
        - 192.168.1.100/24
      gateway4: 192.168.1.1
      nameservers:
        addresses:
          - 8.8.8.8
          - 8.8.4.4

  bridges:
    br0:
      interfaces:
        - eth1
        - eth2
      addresses:
        - 10.0.0.1/24
      parameters:
        stp: true
        forward-delay: 4

  vlans:
    vlan100:
      id: 100
      link: eth0
      addresses:
        - 192.168.100.1/24
