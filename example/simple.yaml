# 最简示例 —— netplan 兼容语法。
network:
  version: 2

  ethernets:
    eth0:
      addresses:
        - 192.168.1.100/24
      routes:
        - to: default          # 等价于已弃用的 gateway4
          via: 192.168.1.1
      nameservers:
        addresses: [8.8.8.8, 8.8.4.4]
        search: [example.com]

    eth1:
      dhcp4: true              # DHCPv4 自动获取

  bridges:
    br0:
      interfaces: [eth2, eth3]
      addresses: [10.0.0.1/24]
      parameters:
        stp: true
        forward-delay: 4

  vlans:
    vlan100:
      id: 100
      link: eth0
      addresses: [192.168.100.1/24]
