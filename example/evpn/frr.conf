! EVPN-VXLAN 叶子节点 —— 控制面（FRR / BGP EVPN）。数据面见同目录 evpn-leaf.yaml。
! 已去敏精简：仅保留必要的 BGP EVPN 对等与 VNI 通告（去掉了 BFD/timers、prefix-list、
! route-map、底层 underlay eBGP 细节）。ASN/IP 均为示例值，按实际替换。
!
! 角色：与 Route-Reflector(RR) 建一条 l2vpn evpn 邻居；advertise-all-vni 自动把数据面
!       （netcfg 配的 vxlan）所有本地 VNI 通告出去；per-VRF 实例做 L3VNI(type-5) 路由。
!
frr version 10.6
frr defaults traditional
service integrated-vtysh-config
!
router bgp 65001
 bgp router-id 192.168.255.4
 no bgp default ipv4-unicast              ! EVPN 场景：默认不开 ipv4-unicast
 bgp bestpath as-path multipath-relax
 !
 ! —— 与 EVPN Route-Reflector 的对等（核心）——
 neighbor EVPN-RR peer-group
 neighbor EVPN-RR remote-as 65000
 neighbor EVPN-RR update-source lo-vtep   ! = 数据面的 VTEP loopback
 neighbor EVPN-RR ebgp-multihop 10
 neighbor 2001:db8:ffff::1 peer-group EVPN-RR
 neighbor 2001:db8:ffff::1 description "EVPN-RR"
 !
 address-family ipv4 unicast
  network 192.168.255.4/32               ! 通告本端 VTEP，供其它 VTEP 建隧道
  maximum-paths 8
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor EVPN-RR activate
  advertise-all-vni                       ! 自动通告本地所有 L2VNI/L3VNI
  advertise-svi-ip                        ! 通告 SVI 网关 IP（IRB）
 exit-address-family
exit
!
! —— L3VNI：租户 VRF 的 EVPN type-5 路由（对应 netcfg vrf-10 / vni-l3-10）——
router bgp 65001 vrf vrf-10
 bgp router-id 192.168.255.4
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
 address-family ipv6 unicast
  redistribute connected
 exit-address-family
 address-family l2vpn evpn
  advertise ipv4 unicast
  advertise ipv6 unicast
  rd 192.168.255.4:10
  route-target import 65000:10
  route-target export 65000:10
 exit-address-family
exit
!
! 把 VRF 关联到 L3VNI（与 netcfg 的 vni-l3-10 / vrf-10 对应）
vrf vrf-10
 vni 10
exit-vrf
!
end
