! EVPN-VXLAN 叶子节点 —— 控制面（FRR / BGP EVPN）。数据面见同目录 evpn-leaf.yaml。
! 已去敏精简（ASN/IP/RD/RT 均为示例占位，按实际替换），但保留「能通」的两层必要对等：
!   1) Underlay eBGP —— 让各 VTEP loopback（含 RR）互相可达，是 overlay 的前提；
!   2) Overlay l2vpn evpn —— 与 RR 交换 MAC/IP/EVPN 路由。
! 去掉了 BFD/timers 等非必要细节。
!
! VTEP loopback = 数据面 lo-vtep 192.168.255.4/32；RR loopback 192.168.255.1（经 underlay 学到）。
!
frr version 10.6
frr defaults traditional
service integrated-vtysh-config
!
! 只接受 VTEP loopback 段（/32），避免 underlay 学到无关路由（可选但推荐）
ip prefix-list VTEP seq 10 permit 192.168.255.0/24 ge 32
route-map UNDERLAY-IN permit 10
 match ip address prefix-list VTEP
exit
!
router bgp 65001
 bgp router-id 192.168.255.4
 no bgp default ipv4-unicast
 bgp bestpath as-path multipath-relax
 !
 ! —— ① Underlay：与上联 spine/leaf 的 eBGP（必要，传播 VTEP loopback）——
 !    这里用编号对等（peer 为上联三层口网关）；也可换成 BGP unnumbered：
 !      neighbor <uplink-if> interface remote-as external
 neighbor UNDERLAY peer-group
 neighbor 192.0.2.1 remote-as 65100
 neighbor 192.0.2.1 peer-group UNDERLAY
 neighbor 192.0.2.1 description "SPINE-uplink"
 !
 ! —— ② Overlay：与 EVPN Route-Reflector 的 l2vpn evpn 邻居（经 underlay 可达）——
 neighbor EVPN-RR peer-group
 neighbor EVPN-RR remote-as 65000
 neighbor EVPN-RR update-source lo-vtep        ! = 数据面 VTEP loopback
 neighbor EVPN-RR ebgp-multihop 10
 neighbor 192.168.255.1 remote-as 65000
 neighbor 192.168.255.1 peer-group EVPN-RR
 neighbor 192.168.255.1 description "EVPN-RR"
 !
 address-family ipv4 unicast
  network 192.168.255.4/32                     ! 通告本端 VTEP loopback
  neighbor UNDERLAY activate
  neighbor UNDERLAY route-map UNDERLAY-IN in   ! 只收 VTEP loopback
  maximum-paths 8
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor EVPN-RR activate
  advertise-all-vni                             ! 自动发现并通告本地所有 VNI：
                                                !   L2VNI=vni-10010(type-2/3)、L3VNI=vni 10(type-5)
                                                !   RD/RT 自动派生；如需固定可加 `vni 10010 { rd..; route-target..}`
  advertise-svi-ip                              ! 通告 SVI 网关 IP（IRB）
 exit-address-family
exit
!
! —— L3VNI：租户 VRF 的 EVPN type-5 路由（对应 netcfg vrf-10 / vni-l3-10）——
router bgp 65001 vrf vrf-10
 bgp router-id 192.168.255.4
 address-family ipv4 unicast
  redistribute connected
 exit-address-family
 address-family ipv6 unicast
  redistribute connected
 exit-address-family
 address-family l2vpn evpn
  advertise ipv4 unicast
  advertise ipv6 unicast
  rd 192.168.255.4:10
  route-target import 65000:10
  route-target export 65000:10
 exit-address-family
exit
!
! 把 VRF 关联到 L3VNI（与 netcfg 的 vni-l3-10 / vrf-10 对应）
vrf vrf-10
 vni 10
exit-vrf
!
end
