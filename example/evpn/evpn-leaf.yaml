# EVPN-VXLAN 叶子节点 —— 数据面（netcfg）。控制面（BGP EVPN）见同目录 frr.conf。
#
# 分工：netcfg/内核负责 VTEP 源 IP、每 VNI 一个 VXLAN、二层网桥、VRF（L3VNI）；
#       FRR 负责 MAC/IP 的学习与通告——VXLAN learning off，由 EVPN 控制面经 netlink
#       下发 FDB/邻居（advertise-all-vni 自动发现并通告本地 VNI）。
# 模型：传统「每 VNI 一个 vxlan + 一个普通网桥」（FRR EVPN 最常用、最稳）。
#       L2VNI = vni-10010，L3VNI = vni-l3-10。
network:
  version: 2

  # VTEP / BGP-EVPN 源 IP —— frr.conf 的 update-source 与通告本端用它
  dummy-devices:
    lo-vtep:
      addresses: [192.168.255.4/32]

  # 租户 L3 路由域（L3VNI）；对应 frr.conf 的 `vrf vrf-10` + `vni 10`
  # 把承载 overlay/L3VNI 的网桥纳入 VRF（网桥即该 VRF 的 L3 设备）
  vrfs:
    vrf-10:
      table: 1010
      interfaces: [br-evpn, br-l3vni]

  bridges:
    # L2VNI 的二层域：普通网桥（每 VNI 一桥），桥自身 IP = 租户 anycast 网关(IRB)。
    # 传统模型用普通网桥；vlan-aware 多 VNI 需 vlan_tunnel 映射，netcfg 暂不配。
    br-evpn:
      interfaces: [vni-10010]      # L2VNI vxlan（+ 业务接入网卡）
      addresses: [10.10.10.1/24]   # 租户网关（advertise-svi-ip 由 FRR 通告）
      parameters: { stp: false, forward-delay: 0 }
    # L3VNI 载体网桥（对称 IRB 的路由 VNI），纳入同一 VRF
    br-l3vni:
      interfaces: [vni-l3-10]
      parameters: { stp: false, forward-delay: 0 }

  tunnels:
    # L2VNI：租户二层延伸。mac-learning=false 关内核自学习(FRR 经 netlink 下发 FDB)；
    # neigh-suppress=true 做 ARP/ND 抑制（EVPN 标准）
    vni-10010:
      mode: vxlan
      id: 10010
      local: 192.168.255.4
      mac-learning: false
      neigh-suppress: true
    # L3VNI：跨子网路由（VNI 10，对应 frr.conf vrf-10 / `vni 10`）
    vni-l3-10:
      mode: vxlan
      id: 10
      local: 192.168.255.4
      mac-learning: false

# 注：netcfg 按固定顺序建设备（vlan 早于 bridge），故本例用「网关 IP 放网桥 +
# 网桥纳入 VRF」而非 vlan-on-bridge 的 SVI；多租户多 VLAN 的 per-VLAN SVI 见 README。
