name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: 7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          LDFLAGS="-s -w"
          LDFLAGS="$LDFLAGS -X github.com/netcfg/netcfg/version.Version=${VERSION#v}"
          LDFLAGS="$LDFLAGS -X github.com/netcfg/netcfg/version.GitCommit=$COMMIT"
          LDFLAGS="$LDFLAGS -X github.com/netcfg/netcfg/version.BuildDate=$DATE"
          
          OUTPUT="netcfg-${VERSION}-${GOOS}-${GOARCH}"
          if [ -n "$GOARM" ]; then
            OUTPUT="${OUTPUT}v${GOARM}"
          fi
          
          go build -ldflags "$LDFLAGS" -o "${OUTPUT}/netcfg" .
          
          # 复制文档和配置文件
          cp README.md LICENSE "${OUTPUT}/" 2>/dev/null || true
          cp -r systemd "${OUTPUT}/" 2>/dev/null || true
          cp -r cloud-init "${OUTPUT}/" 2>/dev/null || true
          cp -r example "${OUTPUT}/" 2>/dev/null || true
          
          # 打包
          tar -czvf "${OUTPUT}.tar.gz" "${OUTPUT}"
          
          # 生成校验和
          sha256sum "${OUTPUT}.tar.gz" > "${OUTPUT}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netcfg-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
          path: |
            *.tar.gz
            *.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "## What's Changed in ${VERSION}" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          
          # 尝试从 git log 生成变更日志
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "### Commits since ${PREV_TAG}" >> CHANGELOG.md
            git log --oneline ${PREV_TAG}..HEAD >> CHANGELOG.md
          else
            echo "Initial release" >> CHANGELOG.md
          fi
          
          echo "" >> CHANGELOG.md
          echo "### Checksums" >> CHANGELOG.md
          echo '```' >> CHANGELOG.md
          cat artifacts/*.sha256 >> CHANGELOG.md
          echo '```' >> CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 注：.deb / .rpm 构建与 apt/yum 仓库发布已移至独立工作流 release-packages.yml
  # （nfpm 单一 spec 生成 deb+rpm，GPG 签名后发布到 GitHub Pages，并附到本 Release）。
