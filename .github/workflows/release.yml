name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: 7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          LDFLAGS="-s -w"
          LDFLAGS="$LDFLAGS -X github.com/netcfg/netcfg/version.Version=${VERSION#v}"
          LDFLAGS="$LDFLAGS -X github.com/netcfg/netcfg/version.GitCommit=$COMMIT"
          LDFLAGS="$LDFLAGS -X github.com/netcfg/netcfg/version.BuildDate=$DATE"
          
          OUTPUT="netcfg-${VERSION}-${GOOS}-${GOARCH}"
          if [ -n "$GOARM" ]; then
            OUTPUT="${OUTPUT}v${GOARM}"
          fi
          
          go build -ldflags "$LDFLAGS" -o "${OUTPUT}/netcfg" .
          
          # 复制文档和配置文件
          cp README.md LICENSE "${OUTPUT}/" 2>/dev/null || true
          cp -r systemd "${OUTPUT}/" 2>/dev/null || true
          cp -r cloud-init "${OUTPUT}/" 2>/dev/null || true
          cp -r example "${OUTPUT}/" 2>/dev/null || true
          
          # 打包
          tar -czvf "${OUTPUT}.tar.gz" "${OUTPUT}"
          
          # 生成校验和
          sha256sum "${OUTPUT}.tar.gz" > "${OUTPUT}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netcfg-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
          path: |
            *.tar.gz
            *.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "## What's Changed in ${VERSION}" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          
          # 尝试从 git log 生成变更日志
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "### Commits since ${PREV_TAG}" >> CHANGELOG.md
            git log --oneline ${PREV_TAG}..HEAD >> CHANGELOG.md
          else
            echo "Initial release" >> CHANGELOG.md
          fi
          
          echo "" >> CHANGELOG.md
          echo "### Checksums" >> CHANGELOG.md
          echo '```' >> CHANGELOG.md
          cat artifacts/*.sha256 >> CHANGELOG.md
          echo '```' >> CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deb-package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download dependencies
        run: go mod download

      - name: Build deb package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          # 编译
          LDFLAGS="-s -w"
          LDFLAGS="$LDFLAGS -X github.com/netcfg/netcfg/version.Version=$VERSION"
          LDFLAGS="$LDFLAGS -X github.com/netcfg/netcfg/version.GitCommit=$COMMIT"
          LDFLAGS="$LDFLAGS -X github.com/netcfg/netcfg/version.BuildDate=$DATE"
          
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o netcfg .
          
          # 创建 deb 目录结构
          PKG_DIR="netcfg_${VERSION}_amd64"
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/lib/systemd/system"
          mkdir -p "${PKG_DIR}/etc/netcfg"
          mkdir -p "${PKG_DIR}/usr/share/doc/netcfg"
          
          # 复制文件
          cp netcfg "${PKG_DIR}/usr/bin/"
          cp systemd/*.service "${PKG_DIR}/lib/systemd/system/" 2>/dev/null || true
          cp README.md "${PKG_DIR}/usr/share/doc/netcfg/"
          cp example/*.yaml "${PKG_DIR}/usr/share/doc/netcfg/" 2>/dev/null || true
          
          # 创建 control 文件
          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: netcfg
          Version: ${VERSION}
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: netcfg authors
          Description: Network configuration tool with netplan compatibility
           A network configuration tool compatible with netplan syntax,
           with native support for network namespaces (netns).
          EOF
          
          # 创建 postinst
          cat > "${PKG_DIR}/DEBIAN/postinst" << 'EOF'
          #!/bin/sh
          set -e
          systemctl daemon-reload || true
          EOF
          chmod 755 "${PKG_DIR}/DEBIAN/postinst"
          
          # 创建 postrm
          cat > "${PKG_DIR}/DEBIAN/postrm" << 'EOF'
          #!/bin/sh
          set -e
          if [ "$1" = "purge" ]; then
              rm -rf /var/lib/netcfg
          fi
          systemctl daemon-reload || true
          EOF
          chmod 755 "${PKG_DIR}/DEBIAN/postrm"
          
          # 构建 deb
          dpkg-deb --build "${PKG_DIR}"
          
          # 生成校验和
          sha256sum "${PKG_DIR}.deb" > "${PKG_DIR}.deb.sha256"

      - name: Upload deb to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          files: |
            *.deb
            *.deb.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
